name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Python lint
        run: uvx ruff check .

      - name: Python format check
        run: uvx ruff format --check .

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install UI deps
        run: cd ui && bun install --frozen-lockfile

      - name: UI lint
        run: cd ui && bun run lint

      - name: UI typecheck
        run: cd ui && bun run typecheck

      - name: UI format check
        run: cd ui && bun run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install UI deps
        run: cd ui && bun install --frozen-lockfile

      - name: Run all tests
        run: make test-all
