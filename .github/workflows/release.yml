name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
      - '[0-9]*.[0-9]*.[0-9]*'

env:
  REGISTRY: australia-southeast1-docker.pkg.dev/field-engineering-apac/kasunt
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Python lint
        run: uvx ruff check .

      - name: Python format check
        run: uvx ruff format --check .

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install UI deps
        run: cd ui && bun install --frozen-lockfile

      - name: UI lint
        run: cd ui && bun run lint

      - name: UI typecheck
        run: cd ui && bun run typecheck

      - name: UI format check
        run: cd ui && bun run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install UI deps
        run: cd ui && bun install --frozen-lockfile

      - name: Run all tests
        run: make test-all

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        include:
          - image: finflow-market-data-mcp
            context: mcp-servers/market-data-mcp
          - image: finflow-portfolio-mcp
            context: mcp-servers/portfolio-mcp
          - image: finflow-news-mcp
            context: mcp-servers/news-mcp
          - image: finflow-brokerage-mcp
            context: mcp-servers/brokerage-mcp
          - image: finflow-market-data-agent
            context: agents/market-data
          - image: finflow-portfolio-agent
            context: agents/portfolio
          - image: finflow-news-sentiment-agent
            context: agents/news-sentiment
          - image: finflow-trade-execution-agent
            context: agents/trade-execution
          - image: finflow-orchestrator
            context: agents/orchestrator
          - image: finflow-bff
            context: bff
          - image: finflow-ui
            context: ui

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: australia-southeast1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
