apiVersion: ar.dev/v1alpha1
kind: Agent
metadata:
  name: finflow-market-data
spec:
  source:
    image: localhost:5000/finflow/market-data-agent:latest
    repository:
      url: https://github.com/<YOUR_ORG>/finflow-demo
      subfolder: agents/market-data
  language: python
  framework: google-adk
  modelProvider: openai
  modelName: gpt-4o
  description: "Real-time market prices, historical data, and sector performance via MCP"
