apiVersion: ar.dev/v1alpha1
kind: Agent
metadata:
  name: finflow-portfolio
spec:
  source:
    image: localhost:5000/finflow/portfolio-agent:latest
    repository:
      url: https://github.com/<YOUR_ORG>/finflow-demo
      subfolder: agents/portfolio
  language: python
  framework: google-adk
  modelProvider: openai
  modelName: gpt-4o
  description: "Portfolio holdings, value, and P&L analysis via MCP"
