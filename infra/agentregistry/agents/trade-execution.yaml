apiVersion: ar.dev/v1alpha1
kind: Agent
metadata:
  name: finflow-trade-execution
spec:
  source:
    image: localhost:5000/finflow/trade-execution-agent:latest
    repository:
      url: https://github.com/<YOUR_ORG>/finflow-demo
      subfolder: agents/trade-execution
  language: python
  framework: google-adk
  modelProvider: openai
  modelName: gpt-4o
  description: "Stock trade execution (BUY/SELL), order status, and order history via MCP"
