apiVersion: ar.dev/v1alpha1
kind: Deployment
metadata:
  name: finflow-trade-execution
spec:
  targetRef:
    kind: Agent
    name: finflow-trade-execution
    tag: "latest"
  runtimeRef:
    kind: Runtime
    name: agentcore
  runtimeConfig:
    region: ${AWS_REGION}
    workdir: agents/trade-execution
    networkMode: vpc
    subnetIds:
      - ${SUBNET_ID}
    securityGroupIds:
      - ${SG_ID}
