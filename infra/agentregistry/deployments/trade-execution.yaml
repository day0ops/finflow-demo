apiVersion: ar.dev/v1alpha1
kind: Deployment
metadata:
  name: finflow-trade-execution
spec:
  targetRef:
    kind: Agent
    name: finflow-trade-execution
    tag: "latest"
  runtimeRef:
    kind: Runtime
    name: agentcore
  env:
    LLM_BASE_URL: https://app.mesh-demo.kasunt.apac.fe.solo.io/openai/v1
    BROKERAGE_MCP_URL: https://app.mesh-demo.kasunt.apac.fe.solo.io/finflow/brokerage
  runtimeConfig:
    region: ${AWS_REGION}
    workdir: agents/trade-execution
    networkMode: vpc
    subnetIds:
      - ${SUBNET_ID}
    securityGroupIds:
      - ${SG_ID}
