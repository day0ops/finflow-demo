apiVersion: ar.dev/v1alpha1
kind: Deployment
metadata:
  name: finflow-portfolio
spec:
  targetRef:
    kind: Agent
    name: finflow-portfolio
    tag: "latest"
  runtimeRef:
    kind: Runtime
    name: agentcore
  runtimeConfig:
    region: ${AWS_REGION}
    workdir: agents/portfolio
    networkMode: vpc
    subnetIds:
      - ${SUBNET_ID}
    securityGroupIds:
      - ${SG_ID}
