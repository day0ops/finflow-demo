apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-agent
  namespace: finflow
  labels:
    app: market-data-agent
    app.kubernetes.io/part-of: finflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-data-agent
  template:
    metadata:
      labels:
        app: market-data-agent
    spec:
      containers:
        - name: agent
          image: finflow/market-data-agent:latest
          ports:
            - containerPort: 8080
          env:
            - name: MARKET_DATA_MCP_URL
              value: "http://agentgateway.finflow.svc/mcp/market-data/mcp/"
            - name: LLM_BASE_URL
              value: "http://agentgateway.finflow.svc/v1"
            - name: LLM_MODEL
              value: "openai/gpt-4o"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: finflow-llm
                  key: api-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: market-data-agent
  namespace: finflow
  labels:
    app: market-data-agent
    app.kubernetes.io/part-of: finflow
spec:
  selector:
    app: market-data-agent
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
