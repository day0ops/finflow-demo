apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-sentiment-agent
  namespace: finflow
  labels:
    app: news-sentiment-agent
    app.kubernetes.io/part-of: finflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: news-sentiment-agent
  template:
    metadata:
      labels:
        app: news-sentiment-agent
    spec:
      containers:
        - name: agent
          image: finflow/news-sentiment-agent:latest
          ports:
            - containerPort: 8000
          env:
            - name: NEWS_MCP_URL
              value: "http://agentgateway.finflow.svc/mcp/news/mcp/"
            - name: ANTHROPIC_BASE_URL
              value: "http://agentgateway.finflow.svc"
            - name: LLM_MODEL
              value: "claude-opus-4-6"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: finflow-llm
                  key: api-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: news-sentiment-agent
  namespace: finflow
  labels:
    app: news-sentiment-agent
    app.kubernetes.io/part-of: finflow
spec:
  selector:
    app: news-sentiment-agent
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
