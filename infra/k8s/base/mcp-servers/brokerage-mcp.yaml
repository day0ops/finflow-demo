apiVersion: apps/v1
kind: Deployment
metadata:
  name: brokerage-mcp
  namespace: finflow
  labels:
    app: brokerage-mcp
    app.kubernetes.io/part-of: finflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brokerage-mcp
  template:
    metadata:
      labels:
        app: brokerage-mcp
    spec:
      containers:
        - name: server
          image: finflow/brokerage-mcp:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: brokerage-mcp
  namespace: finflow
  labels:
    app: brokerage-mcp
    app.kubernetes.io/part-of: finflow
spec:
  selector:
    app: brokerage-mcp
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
