apiVersion: apps/v1
kind: Deployment
metadata:
  name: finflow-ui
  namespace: finflow
  labels:
    app: finflow-ui
    app.kubernetes.io/part-of: finflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finflow-ui
  template:
    metadata:
      labels:
        app: finflow-ui
    spec:
      containers:
        - name: ui
          image: finflow/ui:latest
          ports:
            - containerPort: 3000
          env:
            - name: BFF_URL
              value: "http://finflow-bff:8001"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: finflow-ui
  namespace: finflow
  labels:
    app: finflow-ui
    app.kubernetes.io/part-of: finflow
spec:
  selector:
    app: finflow-ui
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
